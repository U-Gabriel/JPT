name: app
description: "Jackpot Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  http: ^0.13.5
  flutter_bloc: ^8.1.0
  equatable: ^2.0.3
  flutter_blue_plus: ^1.31.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  flutter_stripe: ^10.1.1
  image_picker: ^1.0.7
  http_parser: ^4.0.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logo_complet.svg
    - assets/logo/logo_original.svg
    - assets/logo/favicon_green.svg
    - assets/logo/favicon_original.svg
    - assets/move/move_pot.svg
  generate: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo/favicon_original.png"